<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - TC2005B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="configPanel">
            <label>Renglones: <input type="number" id="rowsInput" value="5" min="1" max="10"></label>
            <label>Columnas: <input type="number" id="colsInput" value="8" min="1" max="15"></label>
            <button id="restartBtn">Reiniciar</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="infoPanel">
            <span>Bloques destruidos: <span id="blocksDestroyed">0</span></span>
            <span>Vidas: <span id="lives">3</span></span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
